<rect x="64.0" y="18.0" width="283.7" height="63.0" rx="9" ry="9" fill="#9c3d3d"/><text x="205.9" y="39.2" text-anchor="middle" font-size="13.0" font-weight="600" fill="#ffffff">Subsystems initialised</text><text x="205.9" y="55.2" text-anchor="middle" font-size="10.5" fill="#dff1ea">Terminal · AppState · Focus · TUIContext</text><text x="205.9" y="69.2" text-anchor="middle" font-size="10.5" fill="#dff1ea">RenderLoop · InputHandler · signal handlers</text>
<polygon points="205.9,111.0 285.7,142.0 205.9,173.0 126.1,142.0" fill="#1f9b76"/><text x="205.9" y="145.7" text-anchor="middle" font-size="13.0" font-weight="600" fill="#ffffff">shouldShutdown?</text>
