<rect x="64.0" y="282.0" width="283.7" height="63.0" rx="9" ry="9" fill="#1f9b76"/><text x="205.9" y="303.2" text-anchor="middle" font-size="13.0" font-weight="600" fill="#ffffff">Drain &amp; dispatch input</text><text x="205.9" y="319.2" text-anchor="middle" font-size="10.5" fill="#dff1ea">≤ 128 events / frame</text><text x="205.9" y="333.2" text-anchor="middle" font-size="10.5" fill="#dff1ea">keys → 5 layers · mouse → hit-test</text>
