<rect x="64.0" y="18.0" width="254.2" height="63.0" rx="9" ry="9" fill="#9c3d3d"/><text x="191.1" y="39.2" text-anchor="middle" font-size="13.0" font-weight="600" fill="#ffffff">Terminal setup</text><text x="191.1" y="55.2" text-anchor="middle" font-size="10.5" fill="#dff1ea">install signals · alt screen</text><text x="191.1" y="69.2" text-anchor="middle" font-size="10.5" fill="#dff1ea">raw mode · mouse tracking</text>
