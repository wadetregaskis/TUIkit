# SwiftLint Configuration for TUIkit

# Only lint project sources (not build artifacts or dependencies)
included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

# Rules
disabled_rules:
  # We use fatalError() intentionally in body properties for Renderable views
  - fatal_error_message
  # Nesting is acceptable for enums inside structs (e.g. Appearance.ID, GeneratedPalette.Hue)
  - nesting
  # BorderStyle.none follows SwiftUI convention (e.g. Font.Weight.none)
  - discouraged_none_name
  # swift-format adds trailing commas (multiElementCollectionTrailingCommas: true)
  - trailing_comma
  # swift-format places opening braces on new lines for wrapped signatures
  - opening_brace
  # A type's length isn't a meaningful quality signal here: cohesive
  # internal render cores (e.g. _ListCore) are clearer kept whole than
  # split across files purely to satisfy a line ceiling.
  - type_body_length

opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - modifier_order
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - shorthand_optional_binding
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

# Rule Configuration
line_length:
  warning: 160
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 600
  error: 1200
  ignore_comment_only_lines: true

function_body_length:
  # The 250-line error ceiling lets the bundled-palette registry in
  # `PalettePreset.swift` stay a single linear list — splitting it just
  # to satisfy the linter would scatter related data across helpers.
  warning: 100
  error: 250

function_parameter_count:
  warning: 8
  error: 12

cyclomatic_complexity:
  warning: 15
  error: 30

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    # (`id` / `to` need no entry: min_length warns only below 2 characters, so
    #  two-letter names already pass.)
    # The example app's terse localized-string lookup, `L("key")` — a deliberate
    # one-letter helper (à la gettext's `_`) kept short because it wraps almost
    # every user-facing string. `Lf("key", args...)` is its formatting sibling
    # (positional `{0}` substitution) used by the stress harness; both read as
    # proper nouns, so the leading-capital convention is intentional.
    - L
    - Lf
    # Framework-private static View witnesses, `_`-prefixed following the
    # SwiftUI convention (as the `_`-prefixed types in `type_name.excluded`
    # are). They let the child-layout path detect Spacer / z-index wrappers
    # per type instead of with a speculative runtime conformance cast.
    - _isSpacer
    - _providesZIndex
    # Idiomatic single-letter math / graphics / loop names: keeping
    # them short matches the surrounding domain (coordinates,
    # colour channels, dimensions, indices) better than renaming.
    - a
    - b
    - c
    - d
    - g
    - h
    - i
    - j
    - k
    - m
    - n
    - p
    - q
    - r
    - s
    - t
    - v
    - w
    - x
    - y
    - z

large_tuple:
  warning: 6
  error: 12

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID
    # Internal _Core views follow SwiftUI pattern (e.g. _AlertCore, _DialogCore).
    # Private _Core views (Card's _CardCore, Table's _TableCore) need no entry —
    # SwiftLint already permits a leading underscore on private declarations.
    - _AlertCore
    - _DialogCore
    - _PanelCore
    - _ListCore
    - _ListContentView
    - _ImageCore
    - _ToggleCore
    # Shared by VStack/LazyVStack and HStack/LazyHStack (one core, two overflow
    # policies), so these cores are internal rather than file-private.
    - _VStackCore
    - _HStackCore
    # Internal _-prefixed helper views and value types created by view
    # modifiers, following the same SwiftUI convention.
    - _TaggedView
    - _ZIndexView
    - _PickerEntry
    - _PickerMenuCore
    - _PickerMenuHandler
    - _RawPickerOption
    # Internal Form row/section model value types.
    - _FormRow
    - _FormRowKind
    - _FormSection
    - _FormElement
    # Carries a per-row .formRowAlignment(_:) override into the form.
    - _FormRowAlignmentModifier
    - _MemoizedRow
    - _SplitDividerHandler
    - _RawTab
    - _Color256GridCore
    - _Palette256Editor
    - _SwatchGridCore
    - _NamedSwatchGrid
